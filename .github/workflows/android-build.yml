name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Build the Vite app
      - name: Build web app
        run: npm run build

      # Sync Capacitor with Android
      - name: Sync Capacitor Android
        run: npx cap sync android

      # Setup Java 17 (required for Gradle)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Cache Gradle dependencies
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # الحل: إعطاء صلاحية التشغيل لملف gradlew قبل البدء في البناء
      - name: Make gradlew executable
        run: |
          cd android
          chmod +x gradlew

      # Build debug APK
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      # Upload the APK as an artifact
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: homemed-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # Build release APK (unsigned)
      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease

      # Upload the release APK as an artifact
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: homemed-release-apk
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      # Create a release summary
      - name: Create Release Summary
        run: |
          echo "## HomeMed Cabinet - Android Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Build Type | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Debug APK | ✅ Built |" >> $GITHUB_STEP_SUMMARY
          echo "| Release APK | ✅ Built (Unsigned) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Download" >> $GITHUB_STEP_SUMMARY
          echo "Download the APK files from the Artifacts section above." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Installation" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo '# Install debug APK on connected device' >> $GITHUB_STEP_SUMMARY
          echo 'adb install app-debug.apk' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
